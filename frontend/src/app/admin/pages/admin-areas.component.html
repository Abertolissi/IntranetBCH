<app-layout>
  <section class="admin-shell">
    <header class="admin-header">
      <div>
        <h1 class="headline-font">AMB de Areas</h1>
        <p>Administra las areas disponibles para documentos.</p>
      </div>
    </header>

    <article class="admin-card">
      <div class="form-row">
        <mat-form-field appearance="outline" class="full-field">
          <mat-label>Nueva area</mat-label>
          <input matInput [(ngModel)]="nuevaArea" placeholder="Ej: Riesgos" />
        </mat-form-field>
        <button mat-raised-button color="primary" (click)="crearArea()">
          <mat-icon>add</mat-icon>
          Agregar
        </button>
      </div>

      <div class="items-list" *ngIf="areas.length > 0; else sinAreas">
        <div class="item-row" *ngFor="let area of areas">
          <ng-container *ngIf="areaEnEdicion !== area; else edicionRow">
            <span>{{ area }}</span>
            <div class="actions">
              <button mat-stroked-button color="primary" (click)="iniciarEdicion(area)">
                <mat-icon>edit</mat-icon>
                Editar
              </button>
              <button mat-stroked-button color="warn" (click)="eliminarArea(area)">
                <mat-icon>delete</mat-icon>
                Eliminar
              </button>
            </div>
          </ng-container>

          <ng-template #edicionRow>
            <mat-form-field appearance="outline" class="full-field">
              <mat-label>Area</mat-label>
              <input matInput [(ngModel)]="areaEditada" />
            </mat-form-field>
            <div class="actions">
              <button mat-raised-button color="primary" (click)="guardarEdicion()">
                <mat-icon>save</mat-icon>
                Guardar
              </button>
              <button mat-stroked-button (click)="cancelarEdicion()">
                <mat-icon>close</mat-icon>
                Cancelar
              </button>
            </div>
          </ng-template>
        </div>
      </div>
    </article>

    <ng-template #sinAreas>
      <article class="admin-card">
        <p>No hay areas configuradas.</p>
      </article>
    </ng-template>
  </section>
</app-layout>
