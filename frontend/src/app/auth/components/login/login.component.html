<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Intranet Bancaria</mat-card-title>
      <mat-card-subtitle>Sistema de Gestión Corporativa</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onLogin()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Usuario o Email</mat-label>
          <input matInput formControlName="usuario" required>
          <mat-error *ngIf="form.get('usuario')?.hasError('required')">
            Usuario es requerido
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" formControlName="contrasena" required>
          <mat-error *ngIf="form.get('contrasena')?.hasError('required')">
            Contraseña es requerida
          </mat-error>
        </mat-form-field>

        <div *ngIf="error" class="error-message">
          {{ error }}
        </div>

        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="full-width"
          [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
          {{ loading ? 'Ingresando...' : 'Ingresar' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
