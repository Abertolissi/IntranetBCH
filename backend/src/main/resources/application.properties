# Spring Boot Application Properties - Intranet Bancaria

# ==================== SERVER CONFIG ====================
server.port=8080
server.servlet.context-path=/api
spring.application.name=intranet-bancaria

# ==================== DATASOURCE - SQL SERVER ====================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=banco;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==================== JPA/HIBERNATE ====================
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Entity scanning
spring.jpa.entity-scan-packages=com.banco.intranet

# ==================== SECURITY - JWT ====================
app.jwt.secret=your_very_long_and_secure_secret_key_min_256_bits_to_ensure_proper_encryption
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ==================== CORS CONFIGURATION ====================
app.cors.allowed-origins=http://localhost:4200,http://localhost:3000
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=*
app.cors.max-age=3600

# ==================== LOGGING ====================
logging.level.root=INFO
logging.level.com.banco.intranet=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/intranet-banco.log

# ==================== FILE UPLOAD ====================
app.upload.dir=uploads/documents
app.upload.max-size=52428800

# ==================== ACTUATOR ====================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
