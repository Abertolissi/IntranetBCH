spring:
  datasource:
    url: jdbc:sqlserver://db:1433;databaseName=banco
    username: sa
    password: your_password_here
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    root: INFO
    com.banco: DEBUG

# Document storage configuration
document:
  storage:
    local:
      path: /storage/documents
    uploads:
      path: /storage/uploads

# Security configuration
security:
  user:
    name: admin@banco.local
    password: AdminPassword123!