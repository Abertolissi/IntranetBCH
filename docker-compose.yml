services:
  db:
    build:
      context: ./database
      dockerfile: Dockerfile
    environment:
      - SA_PASSWORD=YourP@ssword1
      - ACCEPT_EULA=Y
    volumes:
      - db_data:/var/opt/mssql

  db-init:
    build:
      context: ./database
      dockerfile: Dockerfile.init
    environment:
      - SA_PASSWORD=YourP@ssword1
      - ACCEPT_EULA=Y
    volumes:
      - ./database/scripts:/scripts
    depends_on:
      db:
        condition: service_started
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        until /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "YourP@ssword1" -C -Q "SELECT 1" > /dev/null 2>&1; do
          echo "Waiting for SQL Server...";
          sleep 2;
        done &&
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "YourP@ssword1" -C -d master -i /scripts/01_create_database.sql &&
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "YourP@ssword1" -C -d banco -i /scripts/02_create_tables.sql &&
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "YourP@ssword1" -C -d banco -i /scripts/03_seed_data.sql &&
        echo "Database initialization completed"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:sqlserver://db:1433;databaseName=banco;encrypt=false;trustServerCertificate=true
      - DB_USERNAME=sa
      - DB_PASSWORD=YourP@ssword1
    depends_on:
      db:
        condition: service_started
      db-init:
        condition: service_completed_successfully
    volumes:
      - ./storage/documents:/app/storage/documents
      - ./storage/uploads:/app/storage/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  db_data:

networks:
  default:
    driver: bridge

# Best practices for document storage:
# Consider using a dedicated storage service (like AWS S3 or Azure Blob Storage) for scalability and reliability.
# Local storage directories are for temporary or less critical files.